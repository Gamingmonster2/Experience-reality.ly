<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience Reality - Driving Simulation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .ui-panel {
            position: absolute;
            background: rgba(30, 30, 30, 0.85);
            border: 2px solid #ffcc00;
            border-radius: 12px;
            padding: 15px;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #top-left { top: 20px; left: 20px; }
        #top-right { top: 20px; right: 20px; text-align: left; }
        #bottom-left { bottom: 20px; left: 20px; display: flex; gap: 20px; }
        #bottom-right { bottom: 20px; right: 20px; text-align: left; }
        .ui-label {
            font-size: 12px;
            color: #aaaaaa;
            margin-bottom: 5px;
        }
        .ui-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffcc00;
        }
        #click-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffcc00;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.5s;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
    </style>
    <!-- Three.js and GLTFLoader Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="click-overlay">اضغط بالماوس هنا لتشغيل المحرك وبدء اللعبة<br><span style="font-size:16px; color:#fff; margin-top:10px; display:block;">حرك الماوس يميناً ويساراً للتوجيه | اضغط مطولاً للانطلاق</span></div>

    <div id="top-left" class="ui-panel">
        <div class="ui-label">أفضل دورة</div>
        <div class="ui-value">--:--.--</div>
    </div>

    <div id="top-right" class="ui-panel">
        <div class="ui-label">الوقت الحالي</div>
        <div class="ui-value" id="timer-val">00:00.00</div>
    </div>

    <div id="bottom-left" class="ui-panel">
        <div>
            <div class="ui-label">الدورة</div>
            <div class="ui-value">1 / 3</div>
        </div>
        <div style="border-left: 1px solid #444; padding-left: 15px;">
            <div class="ui-label">السرعة</div>
            <div class="ui-value"><span id="speed-val">0</span> <span style="font-size:14px;">كم/س</span></div>
        </div>
    </div>

    <div id="bottom-right" class="ui-panel">
        <div class="ui-label">التحكم بالماوس</div>
        <div class="ui-value" style="font-size:14px; color:#fff;">حرك التوجيه | اضغط مطولاً للبنزين</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, carModel;
        let isAudioInitialized = false;
        let audioCtx, oscillator, gainNode;
        let voiceAssistantCalled = false;
        let lastVoiceTime = 0;

        // Driving physics variables
        let speed = 0;
        const maxSpeed = 0.8;
        const acceleration = 0.01;
        const deceleration = 0.005;
        let carRotation = 0;
        let targetSteer = 0;
        const mouseSensitivity = 0.05;

        // Input state
        let isMouseDown = false;
        let mouseX = 0;

        // Timing
        let startTime = Date.now();

        function init() {
            const container = document.getElementById('canvas-container');

            // Scene setup
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x1a1a1a, 0.015);

            // Camera setup
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 50);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // Skybox Environment using img4.jpg
            const textureLoader = new THREE.TextureLoader();
            textureLoader.load('img4.jpg', function(skyTexture) {
                skyTexture.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = skyTexture;
            });

            // Racetrack Floor using img1.jpg
            textureLoader.load('img1.jpg', function(floorTexture) {
                floorTexture.wrapS = THREE.RepeatWrapping;
                floorTexture.wrapT = THREE.RepeatWrapping;
                floorTexture.repeat.set(100, 100);
                
                const floorMaterial = new THREE.MeshStandardMaterial({ 
                    map: floorTexture,
                    roughness: 0.8,
                    metalness: 0.2
                });
                const floorGeometry = new THREE.PlaneGeometry(1000, 1000);
                const floor = new THREE.Mesh(floorGeometry, floorMaterial);
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                scene.add(floor);
            });

            // Decor billboards using img2.jpg and img3.jpg
            createBillboard('img2.jpg', new THREE.Vector3(-30, 10, -50));
            createBillboard('img3.jpg', new THREE.Vector3(30, 10, -50));

            // Load Custom 3D Asset (alpha.glb)
            const gltfLoader = new THREE.GLTFLoader();
            gltfLoader.load('alpha.glb', function(gltf) {
                carModel = gltf.scene;
                
                // Automatically calculate bounding box sizing to correct scale variations
                const box = new THREE.Box3().setFromObject(carModel);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const targetSize = 5.0; // Standardize scale across different model exports
                const scaleFactor = targetSize / maxDim;
                carModel.scale.set(scaleFactor, scaleFactor, scaleFactor);

                carModel.traverse(function(child) {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        // Guarantee materials render properly regardless of alphaChannel bugs
                        if(child.material) {
                            child.material.transparent = false;
                            child.material.opacity = 1.0;
                            child.material.depthWrite = true;
                        }
                    }
                });

                scene.add(carModel);
            }, undefined, function(error) {
                console.error('Error loading alpha.glb, creating fallback proxy asset.', error);
                createFallbackCar();
            });

            // Global Window Events
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', () => { isMouseDown = true; });
            document.addEventListener('mouseup', () => { isMouseDown = false; });
            
            // Overlay Interaction Activator
            document.getElementById('click-overlay').addEventListener('click', function() {
                this.style.opacity = '0';
                setTimeout(() => this.remove(), 500);
                initNativeAudio();
                triggerVoiceAssistant("Welcome to your game, Saif! Let's hit the track.");
            });

            animate();
        }

        function createBillboard(imagePath, position) {
            const tl = new THREE.TextureLoader();
            tl.load(imagePath, function(texture) {
                const mat = new THREE.MeshStandardMaterial({ map: texture, side: THREE.DoubleSide });
                const geom = new THREE.PlaneGeometry(16, 9);
                const mesh = new THREE.Mesh(geom, mat);
                mesh.position.copy(position);
                mesh.castShadow = true;
                scene.add(mesh);
            });
        }

        function createFallbackCar() {
            const geom = new THREE.BoxGeometry(2, 1, 4);
            const mat = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.5 });
            carModel = new THREE.Mesh(geom, mat);
            carModel.position.y = 0.5;
            carModel.castShadow = true;
            scene.add(carModel);
        }

        function initNativeAudio() {
            if (isAudioInitialized) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                oscillator = audioCtx.createOscillator();
                gainNode = audioCtx.createGain();

                oscillator.type = 'sawtooth'; 
                oscillator.frequency.setValueAtTime(40, audioCtx.currentTime); // Low engine idle rumble
                
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                isAudioInitialized = true;
            } catch(e) {
                console.error("Web Audio API allocation failed", e);
            }
        }

        function triggerVoiceAssistant(phrase) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(phrase);
                utterance.lang = 'en-US';
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }

        function onMouseMove(event) {
            // Normalize screen mouse X coordinate between -1 and 1
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            targetSteer = -mouseX * mouseSensitivity;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function handleCoDriverPrompts(currentSpeed) {
            const now = Date.now();
            if (currentSpeed > 80 && (now - lastVoiceTime > 15000)) { 
                const phrases = ["Speeding up!", "Excellent acceleration!", "Keep pushing!", "Watch the curves!"];
                const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
                triggerVoiceAssistant(randomPhrase);
                lastVoiceTime = now;
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            // Driving System Updates
            if (isMouseDown) {
                speed = THREE.MathUtils.lerp(speed, maxSpeed, acceleration);
            } else {
                speed = THREE.MathUtils.lerp(speed, 0, deceleration);
            }

            if (speed > 0.001) {
                carRotation += targetSteer * (speed / maxSpeed);
            }

            // Sync Asset Transform Coordinates
            if (carModel) {
                carModel.rotation.y = carRotation;
                carModel.position.x += Math.sin(carRotation) * speed;
                carModel.position.z += Math.cos(carRotation) * speed;

                // Dynamic Camera Chase Tracking System
                const cameraOffset = new THREE.Vector3(
                    -Math.sin(carRotation) * 15,
                    6,
                    -Math.cos(carRotation) * 15
                );
                camera.position.copy(carModel.position).add(cameraOffset);
                camera.lookAt(carModel.position.clone().add(new THREE.Vector3(0, 1.5, 0)));
            }

            // Engine Sound Simulation Pitch Adjustments
            if (isAudioInitialized && audioCtx) {
                const speedRatio = speed / maxSpeed;
                const targetFreq = 40 + (speedRatio * 160); // 40Hz to 200Hz transition range
                oscillator.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
            }

            // UI HUD Element Updates
            const simulatedSpeedKmh = Math.floor(speed * 180);
            document.getElementById('speed-val').innerText = simulatedSpeedKmh;
            
            const elapsed = Date.now() - startTime;
            const mins = Math.floor(elapsed / 60000).toString().padStart(2, '0');
            const secs = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
            const cents = Math.floor((elapsed % 1000) / 10).toString().padStart(2, '0');
            document.getElementById('timer-val').innerText = `${mins}:${secs}.${cents}`;

            handleCoDriverPrompts(simulatedSpeedKmh);

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
