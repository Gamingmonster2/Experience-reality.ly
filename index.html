<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>محاكي القيادة ثلاثي الأبعاد</title>
  <!-- Tailwind CSS for modern UI styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Three.js and GLTFLoader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <!-- Font Cairo for beautiful Arabic typography -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      touch-action: none;
    }
    .touch-button {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    /* Simple custom loader animation */
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #3b82f6;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="overflow-hidden bg-gray-950 text-white select-none w-screen h-screen">

  <!-- Main Canvas -->
  <canvas id="gameCanvas" class="absolute inset-0 w-full h-full block z-0"></canvas>

  <!-- LOADING SCREEN -->
  <div id="loadingScreen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-gray-950 transition-opacity duration-500">
    <div class="text-center">
      <h1 class="text-3xl font-black mb-4 tracking-wider text-blue-500">محاكي القيادة الفائق</h1>
      <div class="flex justify-center mb-4">
        <div class="loader"></div>
      </div>
      <p id="loadingText" class="text-gray-400 text-sm">جاري تحميل الأصول والبيئات...</p>
    </div>
  </div>

  <!-- STATE 1: SHOWROOM OVERLAY -->
  <div id="showroomUI" class="absolute inset-0 z-10 flex flex-col justify-between p-6 pointer-events-none transition-opacity duration-500">
    <!-- Header -->
    <header class="flex justify-between items-center w-full pointer-events-auto">
      <div class="bg-gray-900/80 backdrop-blur-md border border-gray-800 px-4 py-2 rounded-xl">
        <h2 class="text-lg font-bold text-white">معرض السيارات</h2>
        <p class="text-xs text-blue-400">اختر لونك المفضل واستعد للسباق</p>
      </div>
    </header>

    <!-- Color Picker & Start Button (Bottom Pane) -->
    <div class="w-full max-w-md mx-auto bg-gray-900/90 backdrop-blur-md border border-gray-800 p-6 rounded-2xl pointer-events-auto shadow-2xl flex flex-col gap-5 mb-4">
      <!-- Swatches -->
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-3 text-center">لون الهيكل الخارجي</label>
        <div class="flex justify-center gap-3">
          <button onclick="changeCarColor('#ef4444')" class="w-10 h-10 rounded-full bg-red-500 border-2 border-white/20 hover:scale-110 active:scale-95 transition-transform shadow-lg"></button>
          <button onclick="changeCarColor('#3b82f6')" class="w-10 h-10 rounded-full bg-blue-500 border-2 border-white/20 hover:scale-110 active:scale-95 transition-transform shadow-lg"></button>
          <button onclick="changeCarColor('#22c55e')" class="w-10 h-10 rounded-full bg-green-500 border-2 border-white/20 hover:scale-110 active:scale-95 transition-transform shadow-lg"></button>
          <button onclick="changeCarColor('#eab308')" class="w-10 h-10 rounded-full bg-yellow-500 border-2 border-white/20 hover:scale-110 active:scale-95 transition-transform shadow-lg"></button>
          <button onclick="changeCarColor('#18181b')" class="w-10 h-10 rounded-full bg-zinc-900 border-2 border-white/20 hover:scale-110 active:scale-95 transition-transform shadow-lg"></button>
          <button onclick="changeCarColor('#f4f4f5')" class="w-10 h-10 rounded-full bg-zinc-100 border-2 border-white/20 hover:scale-110 active:scale-95 transition-transform shadow-lg"></button>
        </div>
      </div>

      <!-- Start Race Button -->
      <button id="startRaceBtn" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 active:scale-95 transition-all rounded-xl font-bold text-lg shadow-lg shadow-blue-500/20 text-center tracking-wide">
        ابدأ السباق الآن
      </button>
    </div>
  </div>

  <!-- STATE 2: DRIVING HUD & CONTROLS -->
  <div id="drivingUI" class="absolute inset-0 z-10 flex flex-col justify-between p-4 pointer-events-none opacity-0 transition-opacity duration-500">
    <!-- Top Bar: Speed & Stats -->
    <header class="flex justify-between items-start w-full pointer-events-auto">
      <div class="bg-gray-900/80 backdrop-blur-md border border-gray-800 px-4 py-3 rounded-xl flex items-center gap-4">
        <div>
          <span class="text-xs text-gray-400 block">السرعة</span>
          <div class="flex items-baseline gap-1">
            <span id="speedometer" class="text-3xl font-black text-blue-400">0</span>
            <span class="text-xs text-gray-500">كم/س</span>
          </div>
        </div>
        <div class="h-8 w-px bg-gray-800"></div>
        <div>
          <span class="text-xs text-gray-400 block">المسافة</span>
          <div class="flex items-baseline gap-1">
            <span id="distanceMeter" class="text-xl font-bold text-white">0</span>
            <span class="text-xs text-gray-500">متر</span>
          </div>
        </div>
      </div>

      <button id="exitRaceBtn" class="bg-red-600/20 hover:bg-red-600/40 border border-red-500/30 px-4 py-2 rounded-xl text-xs font-bold text-red-400 transition-colors">
        إنهاء السباق
      </button>
    </header>

    <!-- Mobile On-Screen Controls (Android-style) -->
    <div class="w-full flex justify-between items-end pointer-events-auto gap-4 mb-2">
      <!-- Steering (Left / Right) -->
      <div class="flex gap-4">
        <button id="btnLeft" class="touch-button w-20 h-20 bg-gray-900/80 active:bg-blue-600/80 border border-gray-800 rounded-2xl flex items-center justify-center shadow-lg active:scale-95 transition-all">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <button id="btnRight" class="touch-button w-20 h-20 bg-gray-900/80 active:bg-blue-600/80 border border-gray-800 rounded-2xl flex items-center justify-center shadow-lg active:scale-95 transition-all">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
        </button>
      </div>

      <!-- Pedals (Brake / Gas) -->
      <div class="flex gap-4">
        <button id="btnBrake" class="touch-button w-20 h-24 bg-red-950/80 active:bg-red-600/80 border border-red-900/50 rounded-2xl flex flex-col items-center justify-center shadow-lg active:scale-95 transition-all">
          <span class="text-xs font-bold text-red-400 mb-1">فرامل</span>
          <div class="w-6 h-8 border-2 border-red-400/50 rounded-sm"></div>
        </button>
        <button id="btnGas" class="touch-button w-20 h-28 bg-green-950/80 active:bg-green-600/80 border border-green-900/50 rounded-2xl flex flex-col items-center justify-center shadow-lg active:scale-95 transition-all">
          <span class="text-xs font-bold text-green-400 mb-1">تسارع</span>
          <div class="w-4 h-12 border-2 border-green-400/50 rounded-sm"></div>
        </button>
      </div>
    </div>
  </div>

  <!-- MAIN SCRIPT -->
  <script>
    // --- Configuration & State ---
    const CONFIG = {
      carPath: './beta.glb',
      roadTexPath: 'image_cf6b08.jpg',
      poleTexPath: 'img6.jpg',
      audio: {
        start: 'engine_start.mp3',
        idle: 'engine_idle.mp3',
        accel: 'engine_accel.mp3'
      }
    };

    let state = 'showroom'; // 'showroom' or 'driving'
    let scene, camera, renderer;
    let mainCarGroup = null;
    let carBodyMesh = null; // reference to change color
    let roadSegments = [];
    let poles = [];
    const roadSegmentLength = 150;
    const numRoadSegments = 4;

    // Physics variables
    let speed = 0;
    const maxSpeed = 80;
    const acceleration = 0.4;
    const deceleration = 0.6;
    const friction = 0.1;
    const turnSpeed = 0.025;
    let carAngle = 0;
    let distanceTraveled = 0;

    // Touch/Key Controls State
    const controls = { left: false, right: false, gas: false, brake: false };

    // Textures & Fallback Generators
    const textureLoader = new THREE.TextureLoader();
    let roadTexture, poleTexture;

    // --- Audio Engine (Web Audio API with Synthesizer Fallbacks) ---
    class GameAudioEngine {
      constructor() {
        this.ctx = null;
        this.buffers = {};
        this.sources = {};
        this.gains = {};
        this.useSynth = false;
        this.synthOsc = null;
        this.synthGain = null;
        this.isInitialized = false;
      }

      init() {
        if (this.isInitialized) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.isInitialized = true;
        this.setupSynth();
        this.preloadAudio();
      }

      setupSynth() {
        // Procedural engine sound fallback
        this.synthGain = this.ctx.createGain();
        this.synthGain.gain.setValueAtTime(0, this.ctx.currentTime);
        this.synthGain.connect(this.ctx.destination);
      }

      async preloadAudio() {
        const loadSound = async (key, url) => {
          try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Network error');
            const arrayBuffer = await response.arrayBuffer();
            this.buffers[key] = await this.ctx.decodeAudioData(arrayBuffer);
          } catch (e) {
            console.warn(`Failed to load audio file: ${url}. Switching to synth fallback for ${key}.`);
            this.useSynth = true;
          }
        };

        await Promise.all([
          loadSound('start', CONFIG.audio.start),
          loadSound('idle', CONFIG.audio.idle),
          loadSound('accel', CONFIG.audio.accel)
        ]);
      }

      playStart() {
        if (!this.isInitialized) this.init();
        if (this.ctx.state === 'suspended') this.ctx.resume();

        if (this.useSynth) {
          this.playSynthStart();
        } else {
          this.playSound('start', false, 1.0);
          setTimeout(() => {
            this.startLoopingSounds();
          }, this.buffers['start'] ? this.buffers['start'].duration * 1000 : 1500);
        }
      }

      startLoopingSounds() {
        if (this.useSynth) return;
        this.playSound('idle', true, 0.6);
        this.playSound('accel', true, 0.0); // Initially silent, gain based on gas
      }

      playSound(key, loop = false, initialVolume = 1.0) {
        if (!this.buffers[key]) return;
        if (this.sources[key]) {
          try { this.sources[key].stop(); } catch(e){}
        }

        const source = this.ctx.createBufferSource();
        source.buffer = this.buffers[key];
        source.loop = loop;

        const gainNode = this.ctx.createGain();
        gainNode.gain.setValueAtTime(initialVolume, this.ctx.currentTime);

        source.connect(gainNode);
        gainNode.connect(this.ctx.destination);

        this.sources[key] = source;
        this.gains[key] = gainNode;

        source.start(0);
      }

      playSynthStart() {
        // Simple start engine synth sweep
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(40, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, this.ctx.currentTime + 0.5);
        osc.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 1.2);

        gain.gain.setValueAtTime(0, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.15, this.ctx.currentTime + 1.2);

        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 1.5);

        setTimeout(() => {
          this.startSynthLoops();
        }, 1200);
      }

      startSynthLoops() {
        this.synthOsc = this.ctx.createOscillator();
        this.synthOsc.type = 'sawtooth';
        this.synthOsc.frequency.setValueAtTime(50, this.ctx.currentTime); // low rumble
        
        // Lowpass filter for engine feel
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(200, this.ctx.currentTime);

        this.synthOsc.connect(filter);
        filter.connect(this.synthGain);
        this.synthOsc.start();
        this.synthGain.gain.setTargetAtTime(0.2, this.ctx.currentTime, 0.1);
      }

      updateEngineSound(speedRatio, isGas) {
        if (!this.isInitialized) return;

        if (this.useSynth) {
          if (this.synthOsc) {
            // Map speed to pitch (50Hz to 250Hz)
            const freq = 50 + (speedRatio * 180);
            this.synthOsc.frequency.setTargetAtTime(freq, this.ctx.currentTime, 0.1);
            // Map gas to volume/rumble
            const vol = 0.15 + (isGas ? 0.15 : 0.05);
            this.synthGain.gain.setTargetAtTime(vol, this.ctx.currentTime, 0.1);
          }
        } else {
          // Crossfade idle and accel based on gas/speed
          if (this.gains['idle'] && this.gains['accel']) {
            const targetAccelVol = isGas ? 0.8 : 0.1;
            const targetIdleVol = isGas ? 0.2 : 0.6;
            this.gains['accel'].gain.setTargetAtTime(targetAccelVol, this.ctx.currentTime, 0.15);
            this.gains['idle'].gain.setTargetAtTime(targetIdleVol, this.ctx.currentTime, 0.15);

            // Pitch shift acceleration sound slightly with speed
            if (this.sources['accel']) {
              const playbackRate = 0.8 + (speedRatio * 0.7);
              this.sources['accel'].playbackRate.setTargetAtTime(playbackRate, this.ctx.currentTime, 0.1);
            }
          }
        }
      }

      stopAll() {
        if (!this.isInitialized) return;
        Object.keys(this.sources).forEach(key => {
          try { this.sources[key].stop(); } catch(e){}
        });
        if (this.synthOsc) {
          try { this.synthOsc.stop(); } catch(e){}
        }
        this.synthGain.gain.setValueAtTime(0, this.ctx.currentTime);
      }
    }

    const audioEngine = new GameAudioEngine();

    // --- Procedural Canvas Fallbacks (If external assets fail) ---
    function createRoadFallbackTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');

      // Asphalt base
      ctx.fillStyle = '#1e293b';
      ctx.fillRect(0, 0, 512, 512);

      // Noise texture
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      for (let i = 0; i < 1000; i++) {
        const x = Math.random() * 512;
        const y = Math.random() * 512;
        ctx.fillRect(x, y, 2, 2);
      }

      // Side lane markers (White)
      ctx.fillStyle = '#f8fafc';
      ctx.fillRect(0, 0, 20, 512);
      ctx.fillRect(492, 0, 20, 512);

      // Center dash lane (Yellow)
      ctx.fillStyle = '#fbbf24';
      for (let y = 0; y < 512; y += 80) {
        ctx.fillRect(250, y + 15, 12, 50);
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(1, 5);
      return tex;
    }

    function createPoleFallbackTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');

      // Gradient metallic pole
      const grad = ctx.createLinearGradient(0, 0, 128, 0);
      grad.addColorStop(0, '#475569');
      grad.addColorStop(0.5, '#94a3b8');
      grad.addColorStop(1, '#334155');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 128, 256);

      // Yellow/Black caution stripes at base
      ctx.fillStyle = '#fbbf24';
      ctx.fillRect(0, 180, 128, 76);
      ctx.fillStyle = '#0f172a';
      ctx.beginPath();
      for (let i = -50; i < 150; i += 30) {
        ctx.moveTo(i, 180);
        ctx.lineTo(i + 20, 180);
        ctx.lineTo(i - 10, 256);
        ctx.lineTo(i - 30, 256);
        ctx.closePath();
        ctx.fill();
      }

      return new THREE.CanvasTexture(canvas);
    }

    function attachHeadlights(carGroup) {
      // Create SpotLights representing actual headlights
      const createHeadlight = (offsetX) => {
        const spotLight = new THREE.SpotLight(0xfffee0, 15, 60, Math.PI / 6, 0.5, 1);
        spotLight.position.set(offsetX, 0.5, 2.2);
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 512;
        spotLight.shadow.mapSize.height = 512;

        // Target slightly in front of the car
        const target = new THREE.Object3D();
        target.position.set(offsetX, 0.2, 12);
        carGroup.add(target);
        spotLight.target = target;

        carGroup.add(spotLight);
      };

      createHeadlight(-0.8);
      createHeadlight(0.8);
    }

    // --- Scene Setup ---
    function initEngine() {
      const canvas = document.getElementById('gameCanvas');
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0f172a); // Stylized dark sky
      scene.fog = new THREE.FogExp2(0x0f172a, 0.005);

      // Camera
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      setCameraShowroom();

      // Ambient Light
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      // Sun/Directional Light
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(20, 40, 20);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 1024;
      dirLight.shadow.mapSize.height = 1024;
      dirLight.shadow.camera.near = 0.5;
      dirLight.shadow.camera.far = 150;
      const d = 40;
      dirLight.shadow.camera.left = -d;
      dirLight.shadow.camera.right = d;
      dirLight.shadow.camera.top = d;
      dirLight.shadow.camera.bottom = -d;
      scene.add(dirLight);

      // Load Assets
      loadAssets();

      // Handle Resize
      window.addEventListener('resize', onWindowResize);
    }

    function setCameraShowroom() {
      camera.position.set(4, 2.5, 5);
      camera.lookAt(0, 0.6, 0);
    }

    function loadAssets() {
      // Road Texture
      textureLoader.load(CONFIG.roadTexPath, 
        (tex) => {
          roadTexture = tex;
          roadTexture.wrapS = THREE.RepeatWrapping;
          roadTexture.wrapT = THREE.RepeatWrapping;
          roadTexture.repeat.set(1, 5);
        },
        undefined,
        () => { roadTexture = createRoadFallbackTexture(); }
      );

      // Pole Texture
      textureLoader.load(CONFIG.poleTexPath,
        (tex) => { poleTexture = tex; },
        undefined,
        () => { poleTexture = createPoleFallbackTexture(); }
      );

      // Car GLB Loader - Configured to load './beta.glb' directly
      const loader = new THREE.GLTFLoader();
      loader.load('./beta.glb',
        (gltf) => {
          mainCarGroup = gltf.scene;
          
          // Ensure correct orientation (must face forward along Z+)
          mainCarGroup.rotation.y = 0; 
          
          // Enable Shadows & Find Painted Mesh for color changer
          mainCarGroup.traverse(child => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
              // Try to find the primary painted exterior body mesh
              if (child.name.toLowerCase().includes('body') || child.name.toLowerCase().includes('paint')) {
                carBodyMesh = child;
              }
            }
          });

          // Fallback reference if naming doesn't match
          if (!carBodyMesh) {
            mainCarGroup.traverse(child => {
              if (child.isMesh && child.material && child.material.color) {
                carBodyMesh = child; // fallback
              }
            });
          }

          // Attach Headlights
          attachHeadlights(mainCarGroup);

          scene.add(mainCarGroup);
          finalizeInitialization();
        },
        undefined,
        (error) => {
          console.error("Error loading './beta.glb':", error);
        }
      );
    }

    function finalizeInitialization() {
      // Build starting road segments
      buildEnvironment();

      // Hide loading screen
      const loaderScreen = document.getElementById('loadingScreen');
      loaderScreen.classList.add('opacity-0');
      setTimeout(() => loaderScreen.remove(), 500);

      // Start animation loop
      animate();
    }

    // --- Environment Generation (Modular Road & Poles) ---
    function buildEnvironment() {
      // Generate initial road segments
      for (let i = 0; i < numRoadSegments; i++) {
        createRoadSegment(i * roadSegmentLength);
      }
    }

    function createRoadSegment(zOffset) {
      const roadWidth = 22;
      const roadGeo = new THREE.PlaneGeometry(roadWidth, roadSegmentLength);
      
      // Use loaded texture or fallback texture
      const actualRoadTex = roadTexture || createRoadFallbackTexture();
      const roadMat = new THREE.MeshStandardMaterial({
        map: actualRoadTex,
        roughness: 0.7,
        metalness: 0.1
      });

      const roadMesh = new THREE.Mesh(roadGeo, roadMat);
      roadMesh.rotation.x = -Math.PI / 2;
      roadMesh.position.set(0, 0, zOffset + roadSegmentLength / 2);
      roadMesh.receiveShadow = true;
      scene.add(roadMesh);

      // Generate Side Poles for this segment
      const poleGeo = new THREE.CylinderGeometry(0.15, 0.15, 8, 12);
      const actualPoleTex = poleTexture || createPoleFallbackTexture();
      const poleMat = new THREE.MeshStandardMaterial({
        map: actualPoleTex,
        roughness: 0.4,
        metalness: 0.5
      });

      const segmentPoles = [];
      const numPoles = 6;
      const spacing = roadSegmentLength / numPoles;

      for (let j = 0; j < numPoles; j++) {
        const poleZ = zOffset + (j * spacing);
        
        // Left Pole
        const poleL = new THREE.Mesh(poleGeo, poleMat);
        poleL.position.set(-roadWidth / 2 - 1, 4, poleZ);
        poleL.castShadow = true;
        scene.add(poleL);
        segmentPoles.push(poleL);

        // Right Pole
        const poleR = new THREE.Mesh(poleGeo, poleMat);
        poleR.position.set(roadWidth / 2 + 1, 4, poleZ);
        poleR.castShadow = true;
        scene.add(poleR);
        segmentPoles.push(poleR);
      }

      roadSegments.push({
        mesh: roadMesh,
        poles: segmentPoles,
        zOffset: zOffset
      });
    }

    function recycleRoad() {
      // Check if the car passed the first segment
      const firstSegment = roadSegments[0];
      if (mainCarGroup && mainCarGroup.position.z > firstSegment.zOffset + roadSegmentLength) {
        // Shift first segment to the far end
        const lastSegment = roadSegments[roadSegments.length - 1];
        const newZOffset = lastSegment.zOffset + roadSegmentLength;

        firstSegment.mesh.position.z = newZOffset + roadSegmentLength / 2;
        firstSegment.zOffset = newZOffset;

        // Reposition poles associated with this segment
        const numPoles = 6;
        const spacing = roadSegmentLength / numPoles;
        let poleIndex = 0;

        for (let j = 0; j < numPoles; j++) {
          const poleZ = newZOffset + (j * spacing);
          // Left Pole
          firstSegment.poles[poleIndex++].position.z = poleZ;
          // Right Pole
          firstSegment.poles[poleIndex++].position.z = poleZ;
        }

        // Rotate segment array
        roadSegments.push(roadSegments.shift());
      }
    }

    // --- State Switching Logic ---
    function startRace() {
      if (!mainCarGroup) return;
      audioEngine.init();
      audioEngine.playStart();

      state = 'driving';
      
      // UI Transitions
      document.getElementById('showroomUI').classList.add('opacity-0', 'pointer-events-none');
      document.getElementById('drivingUI').classList.remove('opacity-0', 'pointer-events-none');

      // Reset car physics & position
      mainCarGroup.position.set(0, 0, 0);
      mainCarGroup.rotation.set(0, 0, 0);
      carAngle = 0;
      speed = 0;
      distanceTraveled = 0;
    }

    function exitRace() {
      if (!mainCarGroup) return;
      audioEngine.stopAll();
      state = 'showroom';

      // UI Transitions
      document.getElementById('drivingUI').classList.add('opacity-0', 'pointer-events-none');
      document.getElementById('showroomUI').classList.remove('opacity-0', 'pointer-events-none');
      document.getElementById('showroomUI').classList.remove('pointer-events-none');

      // Snap camera back to showroom view
      setCameraShowroom();
      mainCarGroup.position.set(0, 0, 0);
      mainCarGroup.rotation.set(0, 0, 0);
    }

    function changeCarColor(hexColor) {
      if (carBodyMesh && carBodyMesh.material) {
        // Handle MultiMaterials or Standard Materials
        if (Array.isArray(carBodyMesh.material)) {
          carBodyMesh.material.forEach(mat => mat.color.set(hexColor));
        } else {
          carBodyMesh.material.color.set(hexColor);
        }
      }
    }

    // --- Physics & Game Loop ---
    let lastTime = performance.now();

    function animate() {
      requestAnimationFrame(animate);

      const now = performance.now();
      const dt = Math.min((now - lastTime) / 1000, 0.1); // Cap delta time to prevent physics clipping
      lastTime = now;

      if (state === 'showroom') {
        // Slow rotaton of the car in the showroom
        if (mainCarGroup) {
          mainCarGroup.rotation.y += 0.005;
        }
      } else if (state === 'driving') {
        updatePhysics(dt);
        updateCamera();
        recycleRoad();
        updateHUD();
      }

      renderer.render(scene, camera);
    }

    function updatePhysics(dt) {
      if (!mainCarGroup) return;

      // Acceleration & Braking
      if (controls.gas) {
        speed += acceleration;
        if (speed > maxSpeed) speed = maxSpeed;
      } else if (controls.brake) {
        speed -= deceleration * 1.5;
        if (speed < -15) speed = -15; // Max reverse speed
      } else {
        // Apply passive road friction
        if (speed > 0) speed -= friction;
        else if (speed < 0) speed += friction;
        if (Math.abs(speed) < 0.2) speed = 0;
      }

      // Steering
      if (speed !== 0) {
        const directionMultiplier = speed > 0 ? 1 : -1;
        if (controls.left) {
          carAngle += turnSpeed * directionMultiplier;
        }
        if (controls.right) {
          carAngle -= turnSpeed * directionMultiplier;
        }
      }

      // Update position based on heading angle
      mainCarGroup.rotation.y = carAngle;
      mainCarGroup.position.x += Math.sin(carAngle) * speed * dt;
      mainCarGroup.position.z += Math.cos(carAngle) * speed * dt;

      // Bound car to the road width boundary
      const roadLimit = 9.5;
      if (mainCarGroup.position.x > roadLimit) {
        mainCarGroup.position.x = roadLimit;
        speed *= 0.95; // Slow down slightly on collision with boundary
      } else if (mainCarGroup.position.x < -roadLimit) {
        mainCarGroup.position.x = -roadLimit;
        speed *= 0.95;
      }

      // Tracking distance traveled
      distanceTraveled += Math.abs(speed) * dt * 0.5;

      // Update Audio Engine speed parameters
      const speedRatio = Math.abs(speed) / maxSpeed;
      audioEngine.updateEngineSound(speedRatio, controls.gas);
    }

    function updateCamera() {
      if (!mainCarGroup) return;

      // 3rd Person Chase Camera
      const offset = new THREE.Vector3(
        -Math.sin(carAngle) * 7.5,
        2.8,
        -Math.cos(carAngle) * 7.5
      );

      const targetCamPos = mainCarGroup.position.clone().add(offset);
      // Smoothly interpolate camera position for dynamic high speed feel
      camera.position.lerp(targetCamPos, 0.15);
      camera.lookAt(mainCarGroup.position.clone().add(new THREE.Vector3(0, 0.8, 0)));
    }

    function updateHUD() {
      document.getElementById('speedometer').textContent = Math.round(Math.abs(speed) * 2.2); // Convert to km/h scale
      document.getElementById('distanceMeter').textContent = Math.round(distanceTraveled);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // --- Input & Control Listeners ---

    // Keyboard controls
    window.addEventListener('keydown', (e) => {
      switch (e.key.toLowerCase()) {
        case 'w': case 'arrowup': controls.gas = true; break;
        case 's': case 'arrowdown': controls.brake = true; break;
        case 'a': case 'arrowleft': controls.left = true; break;
        case 'd': case 'arrowright': controls.right = true; break;
      }
    });

    window.addEventListener('keyup', (e) => {
      switch (e.key.toLowerCase()) {
        case 'w': case 'arrowup': controls.gas = false; break;
        case 's': case 'arrowdown': controls.brake = false; break;
        case 'a': case 'arrowleft': controls.left = false; break;
        case 'd': case 'arrowright': controls.right = false; break;
      }
    });

    // Touch controls setup helper
    function setupTouchButton(elementId, controlKey) {
      const btn = document.getElementById(elementId);
      
      const startAction = (e) => {
        e.preventDefault();
        controls[controlKey] = true;
      };

      const endAction = (e) => {
        e.preventDefault();
        controls[controlKey] = false;
      };

      btn.addEventListener('touchstart', startAction, { passive: false });
      btn.addEventListener('touchend', endAction, { passive: false });
      btn.addEventListener('mousedown', startAction);
      btn.addEventListener('mouseup', endAction);
      btn.addEventListener('mouseleave', endAction);
    }

    setupTouchButton('btnLeft', 'left');
    setupTouchButton('btnRight', 'right');
    setupTouchButton('btnGas', 'gas');
    setupTouchButton('btnBrake', 'brake');

    // UI Buttons Action Listeners
    document.getElementById('startRaceBtn').addEventListener('click', startRace);
    document.getElementById('exitRaceBtn').addEventListener('click', exitRace);

    // Initializer entry point
    window.onload = () => {
      initEngine();
    };
  </script>
</body>
</html>
